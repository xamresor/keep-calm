<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>No Panic, Keep calm, stay informed.</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <meta name="theme-color" content="#1c1c1c" />
  <style>
    :root {
      --bg: #070b16;
      --surface: #101827;
      --surface-hover: #141f31;
      --text: #f3f6ff;
      --text-muted: #a8b2c7;
      --subtitle-tint: #bcc9e4;
      --text-disclaimer: #6c758b;
      --accent: #f59e0b;
      --accent-soft: rgba(254, 123, 2, 0.12);
      --border: #1e2a40;
      --danger: #ef4444;
      --danger-soft: rgba(239, 68, 68, 0.15);
      --warning: #f59e0b;
      --success: #34d399;
      --chart-from: #71717a;
      --chart-to: #FE7B02;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'DM Sans', system-ui, sans-serif;
      background: radial-gradient(circle at top, #0d1527 0%, var(--bg) 34%);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
      color-scheme: dark;
    }

    .container {
      max-width: 1120px;
      margin: 0 auto;
      padding: 0 1.25rem 1rem 2.5rem;
    }

    /* Header – Compact Topbar style */
    .header-row {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1rem;
      backdrop-filter: blur(10px);
      background: rgba(7, 11, 22, 0.95);
    }

    .header-left {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      flex: 1;
      min-width: 0;
    }

    .header-left svg {
      flex-shrink: 0;
      color: var(--warning);
      width: 30px;
      height: 30px;
    }

    .site-title-wrap {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
      flex: 1;
      min-width: 0;
    }

    .site-title {
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      margin: 0;
      font-family: 'JetBrains Mono', monospace;
      white-space: nowrap;
    }

    .disclaimer {
      color: var(--text-disclaimer);
      font-size: 0.6rem;
      margin: 0;
      font-family: 'JetBrains Mono', monospace;
      line-height: 1.4;
    }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
    }

    .header-date {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .lang-btns {
      display: flex;
      gap: 0.25rem;
    }

    .lang-btns button {
      padding: 0.2rem 0.46rem;
      font-size: 0.62rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text-muted);
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }

    .lang-btns button:hover,
    .lang-btns button.active {
      color: var(--accent);
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--subtitle-tint);
      text-transform: uppercase;
      letter-spacing: 0.11em;
      margin: 1rem 0 0 0;
      font-family: 'JetBrains Mono', monospace;
    }

    .title-with-icon {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
    }

    .title-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 13px;
      height: 13px;
      color: var(--accent);
      opacity: 0.92;
      flex-shrink: 0;
    }

    .title-icon svg {
      width: 100%;
      height: 100%;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Chaos – circular gauge + assessment */
    .chaos-section {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 1.8rem;
      align-items: start;
      margin-bottom: 1.2rem;
    }

    @media (max-width: 640px) {
      .chaos-section { grid-template-columns: 1fr; }
    }

    .chaos-gauge-wrap {
      flex-shrink: 0;
      position: relative;
      width: 120px;
      height: 120px;
      margin: 0 auto;
    }

    .chaos-gauge-bg {
      position: absolute;
      inset: 0px;
      border-radius: 50%;
      background: conic-gradient(var(--border) 0deg, var(--border) 360deg);
    }

    .chaos-gauge-arc {
      position: absolute;
      inset: 0px;
      border-radius: 50%;
      background: conic-gradient(
        transparent 0deg,
        var(--accent) calc(var(--from-pct, 0) * 3.6deg),
        var(--accent) calc(var(--to-pct, 0) * 3.6deg),
        transparent calc(var(--to-pct, 0) * 3.6deg)
      );
    }

    .chaos-gauge-inner {
      position: absolute;
      inset: 5px;
      border-radius: 50%;
      background: linear-gradient(180deg, #0b1220 0%, #09101d 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .chaos-gauge-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.93rem;
      font-weight: 700;
      color: var(--accent);
      line-height: 1.2;
      text-align: center;
    }

    .chaos-gauge-label {
      font-size: 0.58rem;
      text-transform: uppercase;
      letter-spacing: 0.11em;
      color: var(--text-muted);
      margin-top: 0.35rem;
      font-family: 'JetBrains Mono', monospace;
    }

    .chaos-content {
      background: transparent;
      border: 0;
      padding: 0.2rem 0 0;
      margin: 0;
    }

    .chaos-content .card-title { margin-bottom: 0.62rem; }

    .assessment {
      color: #d8dfef;
      font-size: 0.9375rem;
      margin: 0 0 1rem;
      line-height: 1.55;
    }

    .triggers-list {
      counter-reset: trigger-index;
      margin: 0;
      padding: 0;
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .triggers-list li {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      font-size: 0.86rem;
      color: #d5dced;
      background: #0f1726;
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 0.58rem 0.8rem;
      flex: 1 1 auto;
      min-width: 0;
    }

    .trigger-index {
      color: var(--accent);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      font-weight: 600;
      flex-shrink: 0;
      opacity: 0.9;
    }

    /* Key indicators – value + trend + chart */
    .indicators-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 0.85rem;
      margin-bottom: 1.55rem;
    }

    .indicator-card {
      background: linear-gradient(180deg, #0f1728 0%, #0d1524 100%);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.95rem 1rem;
    }

    .indicator-card .label {
      font-size: 0.64rem;
      color: var(--subtitle-tint);
      text-transform: uppercase;
      letter-spacing: 0.11em;
      margin-bottom: 0.35rem;
      font-family: 'JetBrains Mono', monospace;
    }

    .indicator-card .value-row {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .indicator-card .value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.52rem;
      font-weight: 500;
      color: var(--text);
    }

    .indicator-trend {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .indicator-trend.up { color: var(--accent); }
    .indicator-trend.down { color: var(--success); }

    .indicator-card .chart-wrap {
      height: 72px;
      margin-top: 0.6rem;
    }

    /* Countries – list / compact */
    .section-title {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--subtitle-tint);
      text-transform: uppercase;
      letter-spacing: 0.11em;
      margin: 1.6rem 0 0.7rem;
      font-family: 'JetBrains Mono', monospace;
    }

    .countries-grid {
      display: flex;
      flex-direction: column;
      gap: 0.58rem;
    }

    .country-card {
      background: linear-gradient(180deg, #0f1727 0%, #0d1523 100%);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem 0.85rem;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }

    .country-card:hover {
      background: var(--surface-hover);
      border-color: #2f4263;
      box-shadow: 0 0 0 1px rgba(47, 66, 99, 0.25) inset;
    }

    .country-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.8rem;
      cursor: pointer;
    }

    .country-left {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      min-width: 0;
      flex: 1;
    }

    .country-info-main {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .country-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #ef4444;
      flex-shrink: 0;
      box-shadow: 0 0 8px rgba(239, 68, 68, 0.4);
    }

    .country-name {
      font-weight: 700;
      font-size: 1.05rem;
      margin: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .country-metrics {
      display: flex;
      gap: 0.45rem;
      align-items: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-muted);
      margin: 0;
      flex-wrap: wrap;
      justify-content: flex-end;
      padding-top: 0.2rem;
    }

    .country-metrics span {
      white-space: nowrap;
      padding: 0.1rem 0.4rem;
      border-radius: 6px;
      background: rgba(16, 29, 48, 0.5);
      border: 1px solid rgba(34, 52, 79, 0.5);
    }

    .country-overall {
      font-weight: 700;
      color: var(--accent) !important;
      background: rgba(245, 158, 11, 0.1) !important;
      border-color: rgba(245, 158, 11, 0.2) !important;
    }

    .country-expand {
      color: var(--text-disclaimer);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      margin-left: 0.4rem;
      width: 1.2rem;
      text-align: right;
    }

    .country-detail {
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      margin-top: 0;
      border-top: 1px solid transparent;
      padding-top: 0;
      transition: max-height 0.3s ease, opacity 0.2s ease, margin-top 0.3s ease, padding-top 0.3s ease;
    }

    .country-card.expanded .country-detail {
      max-height: 800px;
      opacity: 1;
      margin-top: 0.75rem;
      border-top-color: var(--border);
      padding-top: 0.75rem;
    }

    .country-bars {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .country-bar-item .chart-wrap {
      height: 50px;
      margin-top: 0.35rem;
    }

    .country-bar-label {
      color: var(--text-muted);
      font-size: 0.61rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.22rem;
      font-family: 'JetBrains Mono', monospace;
    }

    .country-bar-track {
      height: 8px;
      border-radius: 99px;
      overflow: hidden;
      background: #0a1220;
      border: 1px solid #21314b;
    }

    .country-bar-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, #5b626d 0%, #f59e0b 100%);
      width: 0;
    }

    .country-note {
      display: flex;
      align-items: flex-start;
      gap: 0.4rem;
      font-size: 0.8rem;
      color: #cbd5e1;
      line-height: 1.4;
      margin-top: 0.1rem;
    }

    .country-note-icon {
      width: 12px;
      height: 12px;
      color: var(--success);
      opacity: 0.8;
      flex-shrink: 0;
      margin-top: 0.2rem;
    }

    .country-note-icon svg {
      width: 100%;
      height: 100%;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .country-card .chart-wrap {
      height: 70px;
      margin: 0.5rem 0 0;
    }

    /* Scenarios */
    .scenarios-list {
      padding-top: 0.5rem;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1rem;
    }

    @media (max-width: 940px) {
      .scenarios-list { grid-template-columns: 1fr; }
    }

    .scenario-card {
      background: linear-gradient(180deg, #0f1728 0%, #0d1524 100%);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      position: relative;
      transition: transform 0.2s ease, border-color 0.2s ease;
    }

    .scenario-card:hover {
      transform: translateY(-2px);
    }

    .scenario-card.optimistic { border-color: rgba(52, 211, 153, 0.2); }
    .scenario-card.realistic { border-color: rgba(245, 158, 11, 0.2); }
    .scenario-card.pessimistic { border-color: rgba(239, 68, 68, 0.2); }

    .scenario-card.optimistic:hover { border-color: rgba(52, 211, 153, 0.4); }
    .scenario-card.realistic:hover { border-color: rgba(245, 158, 11, 0.4); }
    .scenario-card.pessimistic:hover { border-color: rgba(239, 68, 68, 0.4); }

    .scenario-badge {
      position: absolute;
      top: 0;
      left: 1rem;
      transform: translateY(-50%);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border-radius: 6px;
      padding: 0.25rem 0.75rem;
      font-size: 0.65rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      border: 1px solid transparent;
      white-space: nowrap;
      z-index: 10;
    }

    .scenario-badge.optimistic { color: #66e7b7; background: #0f1728; border-color: rgba(52, 211, 153, 0.3); }
    .scenario-badge.realistic { color: #f6b94e; background: #0f1728; border-color: rgba(245, 158, 11, 0.3); }
    .scenario-badge.pessimistic { color: #fd7f7f; background: #0f1728; border-color: rgba(239, 68, 68, 0.3); }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    .scenario-desc {
      font-size: 0.85rem;
      line-height: 1.5;
      color: var(--text-muted);
      flex-grow: 1;
    }

    /* Timeline flag chart inside each scenario card */
    .scenario-timeline {
      margin-top: 0rem;
      margin-bottom: 0.5rem;
      padding-top: 1.0rem;
    }

    .timeline-container {
      position: relative;
      height: 24px;
    }

    .timeline-line {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--border);
      border-radius: 1px;
      z-index: 1;
    }

    .scenario-card.optimistic .timeline-line {
      background: linear-gradient(90deg, var(--border) 0%, rgba(52, 211, 153, 0.3) 100%);
    }

    .scenario-card.realistic .timeline-line {
      background: linear-gradient(90deg, var(--border) 0%, rgba(245, 158, 11, 0.3) 100%);
    }

    .scenario-card.pessimistic .timeline-line {
      background: linear-gradient(90deg, var(--border) 0%, rgba(239, 68, 68, 0.3) 100%);
    }

    .timeline-flag-wrapper {
      position: absolute;
      top: -4px;
      transform: translateX(-50%);
      z-index: 5;
    }

    .timeline-months {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
      pointer-events: none;
      z-index: 2;
    }

    .timeline-month-mark {
      position: absolute;
      top: 0;
      width: 1px;
      height: 4px;
      background: var(--border);
      opacity: 0.3;
    }

    .timeline-now-marker {
      position: absolute;
      top: 0;
      width: 8px;
      height: 8px;
      background: #f59e0b;
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(245, 158, 11, 0.5);
      transform: translate(-50%, -3px);
      z-index: 4;
      opacity: 0.8;
    }

    .timeline-now-label {
      position: absolute;
      top: 15px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.6rem;
      font-weight: 800;
      color: var(--accent);
      text-transform: uppercase;
      font-family: 'JetBrains Mono', monospace;
      opacity: 0.7;
    }

    .timeline-years {
      position: relative;
      top: -15px;
      left: 0;
      right: 0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-disclaimer);
    }

    .timeline-year {
      position: absolute;
      transform: translateX(-50%);
      white-space: nowrap;
    }

    .timeline-flag {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    .timeline-flag-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid #0f1728;
      box-shadow: 0 0 0 1px var(--accent);
      transition: transform 0.2s ease;
    }

    .scenario-card:hover .timeline-flag-dot {
      transform: scale(1.2);
    }

    .scenario-card.optimistic .timeline-flag-dot { background: var(--success); box-shadow: 0 0 0 1px var(--success); }
    .scenario-card.realistic .timeline-flag-dot { background: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
    .scenario-card.pessimistic .timeline-flag-dot { background: var(--danger); box-shadow: 0 0 0 1px var(--danger); }

    .timeline-flag-month {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.6rem;
      font-weight: 800;
      font-family: 'JetBrains Mono', monospace;
      white-space: nowrap;
    }

    .scenario-card.optimistic .timeline-flag-month { color: var(--success); }
    .scenario-card.realistic .timeline-flag-month { color: var(--accent); }
    .scenario-card.pessimistic .timeline-flag-month { color: var(--danger); }

    .scenario-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }

    .scenario-desc {
      font-size: 0.89rem;
      color: #d8e0f1;
      line-height: 1.45;
    }

    /* Shipping chokepoint – red alert */
    .chokepoint-card {
      margin-top: 0.4rem;
      margin-bottom: 0.5rem;
    }

    .chokepoint-item {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      font-size: 0.86rem;
      color: #ffe4e4;
      background: linear-gradient(180deg, rgba(127, 24, 24, 0.45) 0%, rgba(106, 23, 23, 0.35) 100%);
      border: 1px solid rgba(239, 68, 68, 0.4);
      border-radius: 9px;
      padding: 0.58rem 0.8rem;
    }

    .chokepoint-icon {
      color: var(--danger);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chokepoint-icon svg {
      width: 14px;
      height: 14px;
    }

    /* Loading & error */
    .loading, .error {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
    }

    .error { color: var(--danger); }

    .updated-at {
      font-size: 0.75rem;
      color: var(--text-disclaimer);
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
    }

    @media (max-width: 780px) {
      .header-row {
        flex-wrap: wrap;
        padding: 0.65rem 0;
      }

      .header-left {
        flex: 1 1 100%;
        order: 1;
      }

      .site-title {
        font-size: 0.85rem;
      }

      .disclaimer {
        font-size: 0.65rem;
      }

      .header-meta {
        flex: 1 1 100%;
        order: 2;
        justify-content: space-between;
        margin-top: 0.5rem;
        padding-top: 0.5rem;
        border-top: 1px solid var(--border);
      }

      .header-date {
        font-size: 0.68rem;
      }

    function withIcon(label, iconKey) {
      const icon = SECTION_ICONS[iconKey] || '';
      return `<span class="title-with-icon">
          <span class="title-icon">${icon}</span>
          <span class="card-title">${label}</span>

    function ui() {
      return UI_COPY[LANG] || UI_COPY.en;
    }

    function labelDaysAgo(days) {
      if (days === 0) return ui().time.today;
      return `${days}${ui().time.daysAgo}`;
    }

    function applyUiCopy() {
      const copy = ui();
      document.title = copy.pageTitle;
      const titleEl = document.getElementById('site-title-text');
      const subtitleEl = document.getElementById('site-subtitle-text');
      const loadingEl = document.getElementById('loading');
      if (titleEl) titleEl.textContent = copy.title;
      if (subtitleEl) subtitleEl.textContent = copy.subtitle;
      if (loadingEl) loadingEl.textContent = copy.loading;
    }

    function t(obj) {
      if (obj == null) return '';
      return typeof obj === 'string' ? obj : (obj[LANG] ?? obj['en'] ?? Object.values(obj)[0] ?? '');
    }

    function getScoreColor(score) {
      if (score == null) return 'var(--text-muted)';
      const val = Math.max(0, Math.min(100, Number(score)));
      
      let r, g, b;
      if (val < 40) {
        // Green (0–40) - Keep it solid Green (52, 211, 153)
        r = 52; g = 211; b = 153;
      } else if (val < 90) {
        // Yellow (40–90) - Interpolate between Green (40) and Red (90)
        // Green (52, 211, 153) to Red (239, 68, 68)
        const p = (val - 40) / 50;
        r = Math.round(52 + (239 - 52) * p);
        g = Math.round(211 + (68 - 211) * p);
        b = Math.round(153 + (68 - 153) * p);
      } else {
        // Red (90–100) - Solid Red (239, 68, 68)
        r = 239; g = 68; b = 68;
      }
      return `rgb(${r}, ${g}, ${b})`;
    }

    function historyToSeries(history) {
      if (!history || typeof history !== 'object') return { labels: [], values: [] };
      const entries = Object.entries(history)
        .filter(([k]) => /^\d+$/.test(k))
        .map(([k, v]) => [parseInt(k, 10), Number(v)]);
      // Older values on the left, today's value on the right.
      entries.sort((a, b) => b[0] - a[0]);
      const labels = entries.map(([d]) => labelDaysAgo(d));
      const values = entries.map(([, v]) => v);
      return { labels, values };
    }

    function createGradient(ctx, chartArea, fromGray = true) {
      if (!chartArea) return 'rgba(254, 123, 2, 0.9)';
      const gradient = ctx.createLinearGradient(chartArea.left, 0, chartArea.right, 0);
      if (fromGray) {
        gradient.addColorStop(0, 'rgba(113, 113, 122, 0.6)');
        gradient.addColorStop(1, 'rgba(254, 123, 2, 0.95)');
      } else {
        gradient.addColorStop(0, 'rgba(254, 123, 2, 0.25)');
        gradient.addColorStop(1, 'rgba(254, 123, 2, 0.02)');
      }
      return gradient;
    }

    function createMiniChart(canvasId, history, valueLabel, isPercentLike = false) {
      const ctx = document.getElementById(canvasId)?.getContext('2d');
      if (!ctx) return null;
      const { labels, values } = historyToSeries(history);
      if (values.length === 0) return null;

      return new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            data: values,
            borderColor: function(context) {
              const chart = context.chart;
              return createGradient(chart.ctx, chart.chartArea, true);
            },
            backgroundColor: function(context) {
              const chart = context.chart;
              return createGradient(chart.ctx, chart.chartArea, false);
            },
            fill: true,
            tension: 0.3,
            borderWidth: 2,
            pointRadius: values.length > 10 ? 1 : 3,
            pointHoverRadius: 5,
            pointBackgroundColor: (ctx) => {
              const idx = ctx.dataIndex;
              const total = ctx.dataset.data.length;
              const opacity = 0.5 + (0.5 * (idx / (total - 1 || 1)));
              return `rgba(254, 123, 2, ${opacity})`;
            },
            pointBorderColor: 'rgba(255, 255, 255, 0.2)',
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: {
            mode: 'index',
            intersect: false,
          },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: 'rgba(15, 23, 42, 0.9)',
              titleFont: { size: 11, family: 'JetBrains Mono' },
              bodyFont: { size: 12, family: 'JetBrains Mono' },
              padding: 8,
              cornerRadius: 6,
              displayColors: false,
              callbacks: {
                label: (item) => {

              max: isPercentLike ? 100 : undefined,
              grid: { color: 'rgba(255,255,255,0.06)', drawBorder: false },
              ticks: { 
                color: '#71717a', 
                font: { size: 9, family: 'JetBrains Mono' },

                callback: (val) => isPercentLike ? val + '%' : val.toLocaleString()

            },
          },
        },
      });
    }

    const chartInstances = [];

    function trendFromHistory(history) {
      if (!history || typeof history !== 'object') return null;
      const cur = history['0'] != null ? Number(history['0']) : null;
      const keys = Object.keys(history).filter(k => /^\d+$/.test(k)).map(Number).sort((a, b) => a - b);
      const oldestKey = keys.find(k => k > 0);
      const past = oldestKey != null ? Number(history[String(oldestKey)]) : null;
      if (cur == null || past == null || past === 0) return null;
      const pct = ((cur - past) / past) * 100;
      return { pct, up: pct >= 0 };
    }

    function renderKeyIndicators(indicators) {
      if (!indicators) return '';
      const items = [
        { key: 'gold_price', label: ui().indicators.gold, historyKey: 'gold_price_history', prefix: '$' },

      let html = `<h2 class="section-title">${withIcon(ui().sections.keyIndicators, 'keyIndicators')}</h2><div class="indicators-grid">`;
      items.forEach((item, i) => {
        const value = indicators[item.key];
        const history = item.historyKey ? indicators[item.historyKey] : null;
        const trend = trendFromHistory(history);
        const valueStr = value != null ? (typeof value === 'number' && value > 100 ? value.toLocaleString() : value) : '—';
        const id = 'chart-indicator-' + i;
        const trendHtml = trend != null
          ? `<span class="indicator-trend ${trend.up ? 'up' : 'down'}">${trend.up ? '▲' : '▼'} ${Math.abs(trend.pct).toFixed(1)}%</span>`
          : '';
        html += `
          <div class="indicator-card">
            <div class="label">${item.label}</div>
            <div class="value-row">
              <span class="value">${item.prefix}${valueStr}</span>
              ${trendHtml}
            </div>
            ${history && Object.keys(history).length ? `<div class="chart-wrap"><canvas id="${id}"></canvas></div>` : ''}
          </div>
        `;
      });
      html += '</div>';
      return html;
    }

      return html;

    function extractYear(dateStr) {
      if (!dateStr) return null;
      const match = dateStr.match(/\d{4}/);
      return match ? parseInt(match[0], 10) : null;
    }

    function extractMonth(dateStr) {
      if (!dateStr) return 6; // Default to middle of year (June)

      const lowerStr = dateStr.toLowerCase();

      // Try to find Q1, Q2, Q3, Q4 first (more specific)
      if (lowerStr.includes('q1')) return 2;
      if (lowerStr.includes('q2')) return 5;
      if (lowerStr.includes('q3')) return 8;
      if (lowerStr.includes('q4')) return 11;

      // Try to find month name (check for short and long forms)
      const monthNames = [
        ['january', 'jan'], ['february', 'feb'], ['march', 'mar'],
        ['april', 'apr'], ['may'], ['june', 'jun'],
        ['july', 'jul'], ['august', 'aug'], ['september', 'sep'],
        ['october', 'oct'], ['november', 'nov'], ['december', 'dec']
      ];

      for (let i = 0; i < monthNames.length; i++) {
        for (let variant of monthNames[i]) {
          if (lowerStr.includes(variant)) {
            return i + 1;
          }
        }
      }

      // Try to find numeric month (e.g., "2026-03-15" or "2026/03/15")
      const monthMatch = dateStr.match(/[-\/](\d{1,2})[-\/]/);
      if (monthMatch) {
        const month = parseInt(monthMatch[1], 10);
        if (month >= 1 && month <= 12) return month;
      }

      // Try format like "2026-03" or "2026/05" (year-month at end of string)
      const monthMatch2 = dateStr.match(/[-\/](\d{1,2})$/);
      if (monthMatch2) {
        const month = parseInt(monthMatch2[1], 10);
        if (month >= 1 && month <= 12) return month;
      }

      // Try format like "03-2026" or "3/2026" (month-year)
      const monthMatch3 = dateStr.match(/^(\d{1,2})[-\/]/);
      if (monthMatch3) {
        const month = parseInt(monthMatch3[1], 10);
        if (month >= 1 && month <= 12) return month;
      }

      // Check for "early", "mid", "late" indicators
      if (lowerStr.includes('early') || lowerStr.includes('beginning')) return 2;
      if (lowerStr.includes('mid') || lowerStr.includes('middle')) return 6;
      if (lowerStr.includes('late') || lowerStr.includes('end')) return 10;

      return 6; // Default to middle of year
    }

    function calculateFlagPosition(month, year, startYear, totalMonths) {
      // Position flag based on the actual date across a dynamic timeline
      // Timeline spans from startYear (Jan) to endYear (Dec)
      // Calculate which month in the totalMonths span (0 to totalMonths-1)
      const monthsFromStart = (year - startYear) * 12 + (month - 1);
      // Convert to percentage
      return (monthsFromStart / totalMonths) * 100;
    }

    function getMonthAbbreviation(month) {
      const months = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
      return months[month - 1] || '';
    }

    function renderScenarios(scenarios, lastUpdated) {
      if (!scenarios || !scenarios.length) return '';

      let timelineStartYear = null;
      if (lastUpdated) {
        timelineStartYear = extractYear(lastUpdated);
      }
      if (!timelineStartYear) {
        timelineStartYear = new Date().getFullYear();
      }

      let html = `<h2 class="section-title">${withIcon(ui().sections.scenarios, 'scenarios')}</h2><div class="scenarios-list">`;

      scenarios.forEach(s => {
        const desc = t(s.description);
        const when = s.when_visible || s.earliest_date || '';
        const normalized = (s.name || '').toLowerCase();
        const toneClass = normalized.includes('optim') ? 'optimistic' : (normalized.includes('pess') ? 'pessimistic' : 'realistic');

        let badgeText = '';
        if (normalized.includes('optim')) {
          badgeText = ui().scenarios.optimistic;
        } else if (normalized.includes('pess')) {
          badgeText = ui().scenarios.pessimistic;
        } else if (normalized.includes('100') || normalized.includes('chaos')) {
          badgeText = ui().scenarios.chaos100;
        } else {
          badgeText = ui().scenarios.realistic;
        }

        // Generate timeline for this scenario
        let timelineHtml = '';
        if (when) {
          const flagYear = extractYear(when);
          if (flagYear) {
            const month = extractMonth(when);
            const startYear = timelineStartYear;
            
            // Dynamic window size: (flagYear + 1) - startYear
            // This ensures the timeline ends at the start of the year following the flag.
            const windowYears = Math.max(1, (flagYear + 1) - startYear);
            const totalMonths = windowYears * 12;
            
            // Position flag based on the month and year relative to startYear and totalMonths
            const flagPosition = calculateFlagPosition(month, flagYear, startYear, totalMonths);

            // Calculate "now" marker position (March 2026 based on the issue description's current date)
            const now = new Date();
            const nowYear = now.getFullYear();
            const nowMonth = now.getMonth() + 1;
            const nowPosition = calculateFlagPosition(nowMonth, nowYear, startYear, totalMonths);

            // Debug: log the date parsing
            console.log('Scenario date:', when, '-> Year:', flagYear, 'Month:', month, 'Timeline Start:', startYear, 'Window Years:', windowYears, 'Position:', flagPosition + '%');

            // Generate month markers
            let monthMarks = '';
            for (let i = 1; i < totalMonths; i++) {
              const pos = (i / totalMonths) * 100;
              monthMarks += `<div class="timeline-month-mark" style="left: ${pos}%"></div>`;
            }

            let nowMarkerHtml = '';
            if (nowPosition >= 0 && nowPosition <= 100) {
              nowMarkerHtml = `<div class="timeline-now-marker" style="left: ${nowPosition}%"><span class="timeline-now-label">NOW</span></div>`;
            }

            // Generate year labels
            let yearLabelsHtml = '';
            for (let i = 0; i <= windowYears; i++) {
              const pos = (i / windowYears) * 100;
              yearLabelsHtml += `<span class="timeline-year" style="left: ${pos}%">${startYear + i}</span>`;
            }

            const monthStr = getMonthAbbreviation(month);

            timelineHtml = `
              <div class="scenario-timeline">
                <div class="timeline-container">
                  <div class="timeline-line"></div>
                  <div class="timeline-months">${monthMarks}</div>
                  ${nowMarkerHtml}
                  <div class="timeline-years">
                    ${yearLabelsHtml}
                  </div>
                  <div class="timeline-flag-wrapper" style="left: ${flagPosition}%">
                    <div class="timeline-flag">

                      <div class="timeline-flag-dot"></div>
                      <span class="timeline-flag-month">${monthStr}</span>
                    </div>
                  </div>
                </div>
              </div>`;
          }
        }

        html += `
          <div class="scenario-card ${toneClass}">
            <span class="scenario-badge ${toneClass}">
              <span class="badge-dot"></span>
              ${badgeText} ${s.probability_percent != null ? '• ' + s.probability_percent + '%' : ''}
            </span>
            ${timelineHtml}
            <div class="scenario-desc">${escapeHtml(desc)}</div>
          </div>
        `;
      });
      html += '</div>';
      return html;
    }

    function escapeHtml(s) {
      if (s == null) return '';
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    function render(data) {
      const chaos = data.global_chaos_probability_100_percent || {};
      const indicators = data.key_indicators_today || {};
      const countries = data.countries || [];
      const scenarios = data.scenarios || [];
      const shipping = indicators.most_critical_shipping_chokepoint_status;

      let html = '';

      if (chaos.probability_from != null || chaos.probability_to != null) {
        const from = chaos.probability_from != null ? chaos.probability_from : 0;
        const to = chaos.probability_to != null ? chaos.probability_to : 0;
        const fromPct = Math.min(100, Math.max(0, from));
        const toPct = Math.min(100, Math.max(0, to));
        html += `
          <div class="chaos-section">
            <div class="chaos-gauge-wrap">
              <div class="chaos-gauge-bg"></div>
              <div class="chaos-gauge-arc" style="--from-pct: ${fromPct}; --to-pct: ${toPct};"></div>
              <div class="chaos-gauge-inner">
                <span class="chaos-gauge-value">${from}–${to}%</span>
                <span class="chaos-gauge-label">${ui().sections.chaosRisk}</span>
              </div>
            </div>
            <div class="chaos-content card">
              <h2 class="section-title">${withIcon(ui().sections.globalAssessment, 'globalAssessment')}</h2>
              ${t(chaos.current_assessment) ? `<p class="assessment">${escapeHtml(t(chaos.current_assessment))}</p>` : ''}
            </div>
          </div>
        `;
      }

      html += renderScenarios(scenarios, data.last_updated);

      if (chaos.probability_from != null || chaos.probability_to != null) {
        html += `
          <div class="chaos-content card">
              ${chaos.triggers_to_watch && Array.isArray(chaos.triggers_to_watch[LANG]) && chaos.triggers_to_watch[LANG].length ? `
                <p class="card-title" style="margin-top:1rem;margin-bottom:0.35rem;">${withIcon(ui().sections.triggersToWatch, 'triggersToWatch')}</p>
                <ul class="triggers-list">${chaos.triggers_to_watch[LANG].map((tr, idx) => '<li><span class="trigger-index">' + String(idx + 1).padStart(2, '0') + '</span><span>' + escapeHtml(tr) + '</span></li>').join('')}</ul>
              ` : ''}
            </div>
        `;
      }

      if (shipping && t(shipping)) {
        html += `
          <div class="chokepoint-card">
            <div class="chokepoint-item">
              <span class="chokepoint-icon">${withIcon('', 'shippingChokepoint')}</span>
              <span>${escapeHtml(t(shipping))}</span>
            </div>
          </div>
        `;
      }

      html += renderKeyIndicators(indicators);
      html += renderCountries(countries);

      const headerDate = document.getElementById('header-date');
      if (headerDate) headerDate.textContent = data.last_updated || '';

      html += `<p class="updated-at">${ui().sections.lastUpdated}: ${escapeHtml(data.last_updated || '')}</p>`;

      document.getElementById('content').innerHTML = html;
      document.getElementById('content').style.display = 'block';
      document.getElementById('loading').style.display = 'none';
      lastData = data;

      document.querySelectorAll('[data-country-toggle]').forEach((toggle) => {
        toggle.addEventListener('click', () => {
          const card = toggle.closest('.country-card');
          if (!card) return;
          card.classList.toggle('expanded');
          const marker = toggle.querySelector('.country-expand');
          if (marker) marker.textContent = card.classList.contains('expanded') ? '−' : '+';
        });
      });

      chartInstances.forEach(c => c.destroy());
      chartInstances.length = 0;

      const indicatorItems = [
        { key: 'gold_price_history', label: 'Gold', isPercent: false },
        { key: 'brent_crude_history', label: 'Brent', isPercent: false },
        { key: 'vix_history', label: 'VIX', isPercent: false },
      ];
      indicatorItems.forEach((item, i) => {
        const hist = indicators[item.key];
        if (hist && Object.keys(hist).length) {
          const chart = createMiniChart('chart-indicator-' + i, hist, item.label, item.isPercent);
          if (chart) chartInstances.push(chart);
        }
      });

      const list = countries.filter(c => c.name && !c.name.includes('Duplicate'));
      list.forEach((c, i) => {
        if (c.overall_history && Object.keys(c.overall_history).length) {
          const chart = createMiniChart('chart-country-overall-' + i, c.overall_history, 'Overall', true);
          if (chart) chartInstances.push(chart);
        }
        if (c.liquidity_history && Object.keys(c.liquidity_history).length) {
          const chart = createMiniChart('chart-country-liq-' + i, c.liquidity_history, 'Liquidity', true);
          if (chart) chartInstances.push(chart);
        }
        if (c.logistics_history && Object.keys(c.logistics_history).length) {
          const chart = createMiniChart('chart-country-log-' + i, c.logistics_history, 'Logistics', true);
          if (chart) chartInstances.push(chart);
        }
        if (c.legitimacy_history && Object.keys(c.legitimacy_history).length) {
          const chart = createMiniChart('chart-country-leg-' + i, c.legitimacy_history, 'Legitimacy', true);
          if (chart) chartInstances.push(chart);
        }
      });
    }

    function showError(msg) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'block';
      document.getElementById('error').textContent = msg;
    }

    document.querySelectorAll('.lang-btns button').forEach(btn => {
      btn.addEventListener('click', () => {
        LANG = btn.getAttribute('data-lang');
        document.querySelectorAll('.lang-btns button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        applyUiCopy();
        if (lastData) render(lastData);
      });
    });

    applyUiCopy();

    fetch('/api/dashboard')
      .then(async (r) => {
        const text = await r.text();
        let data;
        try { data = text ? JSON.parse(text) : null; } catch (_) { data = null; }
        if (!r.ok) {
          const msg = (data && data.error) ? data.error : (r.status === 404 ? ui().errors.noData : `${ui().errors.failedLoad} (${r.status})`);
          throw new Error(msg);
        }
        return data;
      })
      .then(data => {
        if (data && data.error) throw new Error(data.error);
        render(data);
      })
      .catch(err => showError(err.message));
  </script>
</body>
</html>
